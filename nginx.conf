server {
    listen 80;
    server_name localhost;
    
    # Update this path to the actual directory where the project is hosted on the server
    root /var/www/html/medicinal-plants;
    index index.php index.html index.htm;

    # Handle static file routing and fallback to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        # Depending on the OS, use the socket or IP
        # Ubuntu/Linux Example: fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        # Local/Windows Example: fastcgi_pass 127.0.0.1:9000;
        fastcgi_pass 127.0.0.1:9000;
        
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files (e.g. .git, .htaccess)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
