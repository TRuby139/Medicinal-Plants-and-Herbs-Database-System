<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Medicinal Plants Database</title>
    <meta name="description" content="Administrator login for the Medicinal Plants and Herbs Database System.">
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body class="login-body">
    <main class="login-card">
        <form id="login-form" novalidate>
            <h2>Admin Access</h2>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <span class="error-text">Username is required</span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <span class="error-text">Password is required</span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
            <div class="text-center" style="margin-top: 20px;">
                <a href="index.html" class="back-link">&larr; Back to Public Catalogue</a>
            </div>
        </form>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
